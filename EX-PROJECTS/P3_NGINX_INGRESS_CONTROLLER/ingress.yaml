apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microervice-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:

      - path: /
        pathType: Prefix
        backend:
          service:
            name: home-service
            port:
              number: 80

      - path: /service
        pathType: Prefix
        backend:
          service:
            name: offer-service
            port:
              number: 3000

      - path: /payment
        pathType: Prefix
        backend:
          service:
            name: payment-service
            port:
              number: 4000
