apiVersion: batch/v1
kind: CronJob
metadata:
  name: asset-sync
  namespace: pavan-ns-hju2026
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: asset-sync
            image: busybox
            command: ["sh","-c","echo Asset sync completed"]
