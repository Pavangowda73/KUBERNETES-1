apiVersion: batch/v1
kind: CronJob
metadata:
  name: database-cleanup
  namespace: pavan-ns-hju2026
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: cleanup
            image: busybox
            env:
            - name: DB_HOST
              value: mysql
            - name: DB_PORT
              value: "3306"
            command: ["sh","-c","echo Database cleanup completed"]
