apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample1-deployment
  labels:
    app: sample1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample1
  template:
    metadata:
      labels:
        app: sample1
    spec:
      containers:
      - name: sample1
        image: nginx
        ports:
        - containerPort: 80

        env:
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: MONGODB_USERNAME

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: MONGODB_PASSWORD
