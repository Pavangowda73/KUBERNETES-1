apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deploy
  namespace: techmart-dev
  labels:
    app: frontend
    tier: web
    environment: dev
    version: v1.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: frontend
      tier: web
      environment: dev
      version: v1.0
  template:
    metadata:
      labels:
        app: frontend
        tier: web
        environment: dev
        version: v1.0
    spec:
      containers:
      - name: nginx-container
        image: nginx:1.21
        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"

        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/conf.d
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
      volumes:
      - name: config-volume
        configMap:
          name: frontend-nginx-config
---

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: techmart-dev
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: frontend
    tier: web
