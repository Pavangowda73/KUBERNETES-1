apiVersion: v1
kind: Service
metadata:
  name: mysql-headless-service
  namespace: techmart-dev
spec:
  clusterIP: None
  selector:
    app: mysql-db
  ports:
  - port: 3306
    name: mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-db
  namespace: techmart-dev
spec:
  serviceName: "mysql-headless-service"
  replicas: 1
  selector:
    matchLabels:
      app: mysql-db
  template:
    metadata:
      labels:
        app: mysql-db
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"

        startupProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pTechMartSecureRootPass2026"]
          failureThreshold: 12
          periodSeconds: 5
        livenessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pTechMartSecureRootPass2026"]
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials-secret
              key: mysql-root-password
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: database-credentials-secret
              key: mysql-user
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials-secret
              key: mysql-password
        - name: MYSQL_DATABASE
          value: "techmart_catalog"
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-persistent-storage
        persistentVolumeClaim:
          claimName: techmart-db-pvc
