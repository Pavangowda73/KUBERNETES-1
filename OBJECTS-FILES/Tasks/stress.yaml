apiVersion: v1
kind: Pod
metadata:
  name: memory-stress-pod
  namespace: techmart-dev
spec:
  containers:
  - name: stress-container
    image: polinux/stress
    resources:
      requests:
        memory: "50Mi"
      limits:
        memory: "100Mi"
    # Explicitly call the stress binary executable
    command: ["stress"] 
    args: ["--vm", "1", "--vm-bytes", "150M", "--vm-hang", "1"]
  restartPolicy: Never # Changed to Never so it stops on failure instead of looping!
